voucher:
  display_name: "凭证表"
  search_menu:
    - display_name: "按 .No 查询服务"
      search_fields: vo_no
  relation_tables:
    - table_name: "vo_service"
      talbe_display_name: "服务表"
      field: "voucher_key"
    - table_name: "clinic_doctor"
      talbe_display_name: "服务费用表"
      field: "clinic_doctor_key"
    - table_name: "member"
      talbe_display_name: "会员表"
      field: "member_key"
    - table_name: "client_scheme"
      talbe_display_name: "客户方案表"
      field: "client_scheme_key"
    
  scenarios:
    - name: "创建数据检查"
      description: "检查 Voucher 创建时的关键数据，包括创建时间、创建人、状态标记"
      fields:
        - voucher_key
        - vo_no
        - create_date
        - create_by
    - name: "状态检查"
      description: "检查 Voucher 的状态流转信息，包括状态1、状态2及时间戳"
      fields:
        - voucher_key
        - vo_no
        - status
        - sub_status
        - status_time
        - approve_user

    - name: "基本信息检查"
      description: "检查 Voucher 的基本信息，包括编号、单号、总金额"
      fields:
        - voucher_key
        - vo_no
        - total_amount
        - currency
        - customer_id
        - customer_name

    - name: "完整信息检查"
      description: "检查 Voucher 的所有关键信息"
      fields:
        - voucher_key
        - vo_no
        - create_time
        - create_user
        - status
        - sub_status
        - status_time
        - approve_user
        - total_amount
        - currency
        - customer_id
        - customer_name

# ========================================
# VO_SERVICE 表配置
# ========================================
vo_service:
  display_name: "服务表"
  scenarios:
    - name: "常规数据显示"
      description: "检查 Voucher 关联的服务基本信息，包括服务名称、类型、价格"
      fields:
        - vo_service_key
        - voucher_key
        - service_sub_type_key
        - vo_service_used
  relation_tables:
    - table_name: "vo_procedure"
      talbe_display_name: "化验/影像表"
      field: "vo_service_key"


  
# ========================================
# VO_PROCEDURE 表配置
# ========================================
vo_procedure:
  display_name: "流程表"
  scenarios:
    - name: "常规数据显示"
      description: "检查金额"
      fields:
        - vo_procedure_key
        - vo_service_key
        - procedure_master_key
        - vo_proc_unit_cost
        - vo_proc_quantity
        - vo_proc_bill_amount
        - vo_proc_claim_amount
        - vo_proc_copayment
        - vo_proc_req_amount